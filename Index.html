<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rehan Pahriansah — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    /* ===== RESET & ROOT ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #080c14;
      --card: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.06);
      --primary: #6c5ce7;
      --primary2: #a29bfe;
      --accent: #00d4ff;
      --success: #00ff88;
      --text: #e8edf5;
      --text2: #6b7a93;
      --radius: 20px;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      overflow: hidden;
    }

    /* ===== SPLASH SCREEN ===== */
    #splashScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 1.2s ease, visibility 1.2s ease;
    }

    #splashScreen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-content {
      text-align: center;
      animation: splashIn 1.5s ease forwards;
    }

    @keyframes splashIn {
      0% {
        opacity: 0;
        transform: scale(0.8) translateY(30px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .splash-title {
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--accent), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .splash-sub {
      font-size: 18px;
      color: var(--text2);
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 30px;
    }

    .splash-sub span {
      color: var(--primary2);
      font-weight: 600;
    }

    /* ===== BURUNG ===== */
    .bird-container {
      position: relative;
      width: 200px;
      height: 80px;
      margin: 0 auto 30px;
    }

    .bird {
      position: absolute;
      font-size: 40px;
      color: var(--primary);
      opacity: 0.6;
      animation: flyBird 3s ease-in-out infinite;
    }

    .bird:nth-child(1) {
      animation-delay: 0s;
      left: 0;
      top: 20px;
    }
    .bird:nth-child(2) {
      animation-delay: 0.5s;
      left: 40px;
      top: 0;
      font-size: 30px;
      opacity: 0.4;
    }
    .bird:nth-child(3) {
      animation-delay: 1s;
      left: 80px;
      top: 40px;
      font-size: 25px;
      opacity: 0.3;
    }
    .bird:nth-child(4) {
      animation-delay: 1.5s;
      left: 120px;
      top: 10px;
      font-size: 35px;
      opacity: 0.5;
    }
    .bird:nth-child(5) {
      animation-delay: 2s;
      left: 160px;
      top: 30px;
      font-size: 28px;
      opacity: 0.35;
    }

    @keyframes flyBird {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
        opacity: 0.6;
      }
      25% {
        transform: translate(20px, -30px) rotate(-5deg) scale(1.1);
        opacity: 0.8;
      }
      50% {
        transform: translate(-10px, 20px) rotate(5deg) scale(0.9);
        opacity: 0.5;
      }
      75% {
        transform: translate(30px, -10px) rotate(-3deg) scale(1.05);
        opacity: 0.7;
      }
      100% {
        transform: translate(0, 0) rotate(0deg) scale(1);
        opacity: 0.6;
      }
    }

    .loading-bar {
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      overflow: hidden;
      margin: 0 auto;
    }

    .loading-bar .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--success));
      border-radius: 4px;
      animation: loadBar 2.5s ease forwards;
    }

    @keyframes loadBar {
      0% {
        width: 0%;
      }
      100% {
        width: 100%;
      }
    }

    .loading-text {
      font-size: 11px;
      color: var(--text2);
      margin-top: 10px;
      letter-spacing: 2px;
      opacity: 0.5;
    }

    /* ===== MAIN CONTENT ===== */
    #mainContent {
      opacity: 0;
      transition: opacity 1s ease;
    }

    #mainContent.visible {
      opacity: 1;
    }

    body:not(.splash-active) {
      overflow: auto;
    }

    /* ===== BACKGROUND ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(108, 92, 231, 0.05) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(0, 212, 255, 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.2;
      animation: floatParticle linear infinite;
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 0.3;
      }
      90% {
        opacity: 0.3;
      }
      100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
      }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 12s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 300px;
      height: 300px;
      background: rgba(108, 92, 231, 0.08);
      top: -100px;
      right: -100px;
    }
    .orb-2 {
      width: 400px;
      height: 400px;
      background: rgba(0, 212, 255, 0.06);
      bottom: -150px;
      left: -150px;
      animation-delay: 4s;
    }
    .orb-3 {
      width: 250px;
      height: 250px;
      background: rgba(0, 255, 136, 0.05);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 8s;
    }

    @keyframes orbFloat {
      0% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(30px, -40px) scale(1.1);
      }
      66% {
        transform: translate(-20px, 20px) scale(0.9);
      }
      100% {
        transform: translate(10px, -10px) scale(1.05);
      }
    }

    * {
      position: relative;
      z-index: 1;
    }

    /* ===== GLASS ===== */
    .glass {
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: 0.4s;
    }
    .glass:hover {
      border-color: rgba(108, 92, 231, 0.15);
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0 30px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--accent), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }

    .logo span {
      font-weight: 300;
      -webkit-text-fill-color: var(--text2);
    }

    nav {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--text2);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: 0.3s;
      position: relative;
      padding: 4px 0;
      letter-spacing: 0.3px;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: 0.3s;
      border-radius: 4px;
    }

    nav a:hover {
      color: var(--text);
    }
    nav a:hover::after {
      width: 100%;
    }

    /* ===== HERO ===== */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
      padding: 20px 0 40px;
    }

    @media (max-width: 768px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 30px;
        text-align: center;
      }
    }

    .hero-text .badge {
      display: inline-block;
      background: rgba(108, 92, 231, 0.12);
      color: var(--primary2);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 16px;
      border-radius: 20px;
      border: 1px solid rgba(108, 92, 231, 0.15);
      margin-bottom: 16px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      animation: badgeGlow 2s ease-in-out infinite;
    }

    @keyframes badgeGlow {
      0%,
      100% {
        box-shadow: 0 0 10px rgba(108, 92, 231, 0);
      }
      50% {
        box-shadow: 0 0 20px rgba(108, 92, 231, 0.1);
      }
    }

    .hero-text h1 {
      font-size: 48px;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 12px;
      animation: fadeUp 0.8s ease;
    }

    .hero-text h1 span {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 4s ease-in-out infinite;
    }

    @keyframes gradientShift {
      0%,
      100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }

    .hero-text .title-role {
      font-size: 18px;
      color: var(--text2);
      font-weight: 400;
      margin-bottom: 16px;
    }

    .hero-text .title-role span {
      color: var(--success);
      font-weight: 600;
    }

    .hero-text p {
      color: var(--text2);
      font-size: 15px;
      max-width: 480px;
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .hero-text p {
        margin-left: auto;
        margin-right: auto;
      }
    }

    .hero-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    @media (max-width: 768px) {
      .hero-buttons {
        justify-content: center;
      }
    }

    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #5a4bd1);
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: translateX(-100%);
      transition: 0.6s;
    }

    .btn-primary:hover::before {
      transform: translateX(100%);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 40px rgba(108, 92, 231, 0.25);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-3px);
    }

    .hero-avatar {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .avatar-ring {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(135deg, var(--primary), var(--accent), var(--success));
      animation: rotateRing 8s linear infinite;
    }

    @keyframes rotateRing {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .avatar-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg);
      border: 4px solid var(--bg);
      animation: pulseImage 3s ease-in-out infinite;
    }

    @keyframes pulseImage {
      0%,
      100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.02);
      }
    }

    @media (max-width: 768px) {
      .avatar-ring {
        width: 200px;
        height: 200px;
      }
    }

    .social-links {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    @media (max-width: 768px) {
      .social-links {
        justify-content: center;
      }
    }

    .social-links a {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      font-size: 18px;
      transition: 0.3s;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .social-links a::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--primary);
      opacity: 0;
      transition: 0.3s;
      border-radius: 12px;
    }

    .social-links a:hover {
      border-color: var(--primary);
      color: #fff;
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 30px rgba(108, 92, 231, 0.2);
    }

    .social-links a:hover::before {
      opacity: 0.15;
    }

    .social-links a i {
      position: relative;
      z-index: 1;
    }

    /* ===== SECTION ===== */
    section {
      padding: 40px 0;
    }

    .section-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title span {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section-title .line {
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ===== GRID ===== */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
      .grid-3 {
        grid-template-columns: 1fr 1fr;
      }
      .grid-4 {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 480px) {
      .grid-3 {
        grid-template-columns: 1fr;
      }
      .grid-4 {
        grid-template-columns: 1fr;
      }
    }

    /* ===== CARD ===== */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: 0.4s;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(40px);
      animation: fadeUp 0.8s ease forwards;
    }

    .card:nth-child(1) {
      animation-delay: 0.1s;
    }
    .card:nth-child(2) {
      animation-delay: 0.2s;
    }
    .card:nth-child(3) {
      animation-delay: 0.3s;
    }
    .card:nth-child(4) {
      animation-delay: 0.4s;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: 0.4s;
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(108, 92, 231, 0.15);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }

    .card .icon {
      font-size: 32px;
      color: var(--primary);
      margin-bottom: 12px;
      display: block;
      animation: iconBounce 2s ease-in-out infinite;
    }

    @keyframes iconBounce {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-5px);
      }
    }

    .card h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.7;
    }

    .card .tag {
      display: inline-block;
      background: rgba(108, 92, 231, 0.08);
      color: var(--primary2);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 12px;
      border-radius: 12px;
      margin-top: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ===== PANEL ===== */
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: 0.4s;
      opacity: 0;
      transform: translateY(40px);
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 0.2s;
    }

    .panel:hover {
      border-color: rgba(108, 92, 231, 0.15);
    }

    .panel .panel-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel .panel-title i {
      color: var(--primary);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }

    .input-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: 0.3px;
    }

    .input-group input {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: 0.3s;
      outline: none;
      width: 100%;
    }

    .input-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(108, 92, 231, 0.08);
    }

    .log-area {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 10px;
      padding: 12px 14px;
      max-height: 120px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--text2);
      margin-top: 12px;
      border: 1px solid var(--border);
    }

    .log-area .log-line {
      padding: 2px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .log-area .log-line .time {
      color: var(--text2);
      opacity: 0.5;
      margin-right: 8px;
    }
    .log-area .log-line .success {
      color: var(--success);
    }
    .log-area .log-line .error {
      color: #ff6b6b;
    }
    .log-area .log-line .info {
      color: var(--accent);
    }

    /* ===== STATS ===== */
    .stats-grid {
      display: grid;
